version: "3.8"

services:
  web-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install; npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  web_node_modules:
